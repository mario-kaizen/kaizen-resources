server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = / {
        return 302 /design-system;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
